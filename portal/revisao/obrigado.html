<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitacao Enviada - Revisao de Prova</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.3rem; color: #2e7d32; margin-bottom: 12px; }
        p { color: #555; font-size: 0.95rem; margin-bottom: 8px; }
        .back-link {
            display: inline-block; margin-top: 20px; padding: 12px 24px;
            background: #1a237e; color: white; border-radius: 8px;
            text-decoration: none; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#10004;</div>
        <h1>Solicitacao enviada com sucesso!</h1>
        <p>Sua revisao sera analisada pelo professor.</p>
        <p>O resultado sera comunicado em breve.</p>
        <a href="/revisao/" class="back-link">Enviar outra solicitacao</a>
    </div>
</body>
</html>
